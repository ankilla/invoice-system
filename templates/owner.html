{% extends "base.html" %}
{% block title %}Owner Details{% endblock %}
{% block page_title %}Owner / Company Details{% endblock %}
{% block content %}
<div class="card" style="max-width:700px">
  <div class="card-header">
    <div class="card-title"><i class="fa fa-building"></i> Company Information</div>
    <span class="badge badge-info">Single record – your company profile</span>
  </div>
  <div id="alert-area"></div>
  <form id="owner-form">
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1">
        <label>Company Name *</label>
        <input class="form-control" name="company_name" required placeholder="e.g. VIKRANTH PUBLISHERS">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>Address</label>
        <textarea class="form-control" name="address" rows="2" placeholder="Full address with city and pincode"></textarea>
      </div>
      <div class="form-group">
        <label>State</label>
        <input class="form-control" name="state" placeholder="e.g. Andhra Pradesh">
      </div>
      <div class="form-group">
        <label>Mobile</label>
        <input class="form-control" name="mobile" placeholder="10-digit mobile number">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input class="form-control" name="email" type="email" placeholder="company@email.com">
      </div>
      <div class="form-group">
        <label>GSTIN No</label>
        <input class="form-control" name="gstin" placeholder="e.g. 37ACOPG1874G1ZE" style="text-transform:uppercase">
      </div>
    </div>
    <div style="margin-top:20px;display:flex;gap:10px">
      <button type="submit" class="btn btn-primary"><i class="fa fa-save"></i> Save Details</button>
      <button type="reset" class="btn btn-outline"><i class="fa fa-undo"></i> Reset</button>
    </div>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
const form=document.getElementById('owner-form');

async function loadOwner(){
  const data=await api('/api/owner');
  if(data && data.company_name){
    Object.keys(data).forEach(k=>{
      const el=form.querySelector('[name="'+k+'"]');
      if(el) el.value=data[k]||'';
    });
  }
}
loadOwner();

form.addEventListener('submit',async e=>{
  e.preventDefault();
  const btn=form.querySelector('button[type=submit]');
  btn.innerHTML='<span class="spinner"></span> Saving...'; btn.disabled=true;
  const data={};
  new FormData(form).forEach((v,k)=>data[k]=v);
  const r=await api('/api/owner','POST',data);
  btn.innerHTML='<i class="fa fa-save"></i> Save Details'; btn.disabled=false;
  if(r.success){
    toast('Company details saved!','success');
    document.getElementById('alert-area').innerHTML='<div class="alert alert-success"><i class="fa fa-check-circle"></i> Saved successfully</div>';
    setTimeout(()=>document.getElementById('alert-area').innerHTML='',3000);
  } else {
    toast('Error: '+r.error,'error');
  }
});
</script>
{% endblock %}
