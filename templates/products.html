{% extends "base.html" %}
{% block title %}Products{% endblock %}
{% block page_title %}Product Master{% endblock %}
{% block content %}
<div class="card">
  <div class="card-header">
    <div class="card-title"><i class="fa fa-box"></i> Products</div>
    <button class="btn btn-primary" onclick="openModal()"><i class="fa fa-plus"></i> Add Product</button>
  </div>
  <div class="search-bar">
    <input class="form-control" id="search-input" placeholder="🔍  Search by code or description..." oninput="searchProducts(this.value)">
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Product Code</th><th>Description</th><th>Rate (₹)</th><th style="width:100px">Actions</th></tr></thead>
      <tbody id="prod-tbody"></tbody>
    </table>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Add Product</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <form id="prod-form">
      <input type="hidden" name="id">
      <div class="form-grid" style="grid-template-columns:1fr 1fr">
        <div class="form-group">
          <label>Product Code *</label>
          <input class="form-control" name="product_code" required placeholder="e.g. 1051A" style="text-transform:uppercase">
        </div>
        <div class="form-group">
          <label>Rate (₹) *</label>
          <input class="form-control" name="rate" type="number" step="0.01" min="0" required placeholder="0.00">
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label>Description *</label>
          <input class="form-control" name="description" required placeholder="Product name / description">
        </div>
      </div>
      <div style="margin-top:18px;display:flex;gap:10px">
        <button type="submit" class="btn btn-primary" id="save-btn"><i class="fa fa-save"></i> Save Product</button>
        <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function loadProducts(q=''){
  const url=q?`/api/products/search?q=${encodeURIComponent(q)}`:'/api/products';
  const data=await api(url);
  const tbody=document.getElementById('prod-tbody');
  if(!data.length){tbody.innerHTML='<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:20px">No products found</td></tr>';return;}
  tbody.innerHTML=data.map(p=>`<tr>
    <td><span class="badge badge-info">${p.product_code}</span></td>
    <td>${p.description}</td>
    <td style="text-align:right;font-weight:600">₹${parseFloat(p.rate).toFixed(2)}</td>
    <td>
      <button class="btn btn-outline btn-sm" onclick="editProduct(${p.id})"><i class="fa fa-edit"></i></button>
      <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id},'${p.description.replace(/'/g,"\\'")}')"><i class="fa fa-trash"></i></button>
    </td>
  </tr>`).join('');
}

function searchProducts(q){ loadProducts(q); }

function openModal(data=null){
  const form=document.getElementById('prod-form');
  form.reset();
  document.getElementById('modal-title').textContent=data?'Edit Product':'Add Product';
  if(data) Object.keys(data).forEach(k=>{const el=form.querySelector('[name="'+k+'"]');if(el)el.value=data[k]||'';});
  document.getElementById('modal').classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); }

async function editProduct(id){
  const prods=await api('/api/products');
  const p=prods.find(x=>x.id===id);
  if(p) openModal(p);
}

async function deleteProduct(id,name){
  if(!confirm(`Delete product "${name}"?`)) return;
  const r=await api('/api/products/'+id,'DELETE');
  if(r.success){toast('Product deleted');loadProducts();}
  else toast('Error: '+r.error,'error');
}

document.getElementById('prod-form').addEventListener('submit',async e=>{
  e.preventDefault();
  const form=e.target;
  const btn=document.getElementById('save-btn');
  btn.innerHTML='<span class="spinner"></span>'; btn.disabled=true;
  const data={};
  new FormData(form).forEach((v,k)=>data[k]=v);
  const id=data.id; delete data.id;
  let r;
  if(id){ r=await api('/api/products/'+id,'PUT',data); }
  else { r=await api('/api/products','POST',data); }
  btn.innerHTML='<i class="fa fa-save"></i> Save Product'; btn.disabled=false;
  if(r.success){toast(id?'Product updated!':'Product added!');closeModal();loadProducts();}
  else toast('Error: '+r.error,'error');
});

loadProducts();
</script>
{% endblock %}
